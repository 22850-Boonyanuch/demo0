<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>การ์ดประวัติส่วนตัวนักเรียน - ด.ญ.บุณยานุช ปาปัน</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f4f8;
            color: #2d3748;
            display: flex;
            flex-direction: column; /* เปลี่ยนเป็น column เพื่อให้รูปภาพอยู่ด้านบน */
            align-items: center;
            min-height: 100vh;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            padding-top: 20px; /* เพิ่มช่องว่างด้านบน */
        }

        /* สไตล์สำหรับรูปภาพที่เพิ่ม */
        .header-image {
            display: block;
            max-width: 500px;
            height: auto;
            margin: 0 auto 20px auto; /* จัดกึ่งกลางและเพิ่มช่องว่างด้านล่าง */
            border-radius: 15px; /* เพิ่มมุมโค้งให้รูปภาพ */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .profile-card {
            background: #ffffff;
            width: 800px;
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            position: relative;
            margin-bottom: 20px; /* เพิ่มช่องว่างด้านล่างการ์ด */
        }

        /* Header Style */
        .card-header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: #ffffff;
            padding: 30px;
            position: relative;
        }

        .header-content {
            display: table;
            width: 100%;
        }

        .avatar-container {
            display: table-cell;
            vertical-align: middle;
            width: 100px;
        }

        .avatar {
            width: 85px;
            height: 85px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 3px solid #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .info-container {
            display: table-cell;
            vertical-align: middle;
            padding-left: 20px;
        }

        .school-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .student-name {
            font-size: 1.8em;
            font-weight: 700;
            margin: 0 0 5px 0;
            letter-spacing: 0.5px;
        }

        .student-meta {
            font-size: 1em;
            opacity: 0.9;
        }
